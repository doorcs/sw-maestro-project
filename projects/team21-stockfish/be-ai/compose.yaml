x-app: &app
  build:
    context: .
  image: be-ai:local
  env_file:
    - .env
  volumes:
    - be_ai_data:/app/data

services:
  collector:
    <<: *app
    command:
      - python
      - -m
      - app.ingestion.manual_collect
    restart: "no"

  api:
    <<: *app
    command:
      - uvicorn
      - app.main:app
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    depends_on:
      collector:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health', timeout=2).read()"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  be_ai_data:
